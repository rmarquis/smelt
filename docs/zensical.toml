[project]
site_name = "Agent"
site_description = "A Rust TUI coding agent. Connects to any OpenAI-compatible API and provides an interactive terminal interface for code generation, analysis, and assistance."
site_author = "Leonard Cseres"
site_url = "https://leonardcser.github.io/agent/"
repo_url = "https://github.com/leonardcser/agent"
edit_uri = "edit/main/docs/docs/"

nav = [
  { "Home" = "index.md" },
  { "Guide" = [
    { "Getting Started" = "guide/getting-started.md" },
    { "Usage" = "guide/usage.md" },
    { "Customization" = "guide/customization.md" },
  ]},
  { "Reference" = [
    { "CLI" = "reference/cli.md" },
    { "Configuration" = "reference/configuration.md" },
    { "Tools" = "reference/tools.md" },
    { "Keybindings" = "reference/keybindings.md" },
    { "Permissions" = "reference/permissions.md" },
  ]},
  { "Advanced" = [
    { "Multi-Agent" = "advanced/multi-agent.md" },
    { "Headless" = "advanced/headless.md" },
    { "Sessions & History" = "advanced/sessions.md" },
  ]},
]

[project.theme]
language = "en"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[project.theme.font]
code = "JetBrains Mono"

[project.theme.icon]
logo = "lucide/terminal"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/leonardcser/agent"
